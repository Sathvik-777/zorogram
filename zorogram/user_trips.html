<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User's Trips</title>

  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    .trip {
      border: 2px solid #ccc;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 10px;
    }
    .day {
      margin-left: 20px;
      margin-top: 10px;
    }
    .entry {
      margin-left: 40px;
      margin-top: 5px;
    }
  </style>
</head>
<body>

  <h1 id="page-title">Loading trips...</h1> <!-- Give the H1 an id -->
  <div id="tripsContainer"></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBVNJzEZQyY0RCZlkfrqKrKdIggQrx62KU",
      authDomain: "zorogram-e0eea.firebaseapp.com",
      projectId: "zorogram-e0eea",
      storageBucket: "zorogram-e0eea.appspot.com",
      messagingSenderId: "3495535292",
      appId: "1:3495535292:web:3c8c21807fbfd1d3d026b9",
      measurementId: "G-7YFSQZZ72G"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const tripsContainer = document.getElementById('tripsContainer');
    const pageTitle = document.getElementById('page-title');

    // Read username from URL
    const urlParams = new URLSearchParams(window.location.search);
    const username = urlParams.get('user');

    if (!username) {
      pageTitle.textContent = "No username provided.";
    } else {
      pageTitle.textContent = `${username}'s Trips`; // ✅ Dynamically update the page title

      db.collection(username).get()
        .then((querySnapshot) => {
          if (querySnapshot.empty) {
            tripsContainer.innerHTML = `<p>No trips found for user: ${username}</p>`;
            return;
          }

          querySnapshot.forEach((doc) => {
            const tripData = doc.data();
            const tripDiv = document.createElement('div');
            tripDiv.classList.add('trip');

            const tripTitle = document.createElement('h2');
            tripTitle.textContent = `Trip: ${doc.id}`;
            tripDiv.appendChild(tripTitle);

            if (tripData.total_days) {
              for (let i = 1; i <= tripData.total_days; i++) {
                db.collection(username)
                  .doc(doc.id)
                  .collection(`Day ${i}`)
                  .get()
                  .then((daySnapshot) => {
                    const dayDiv = document.createElement('div');
                    dayDiv.classList.add('day');
                    
                    const dayTitle = document.createElement('h3');
                    dayTitle.textContent = `Day ${i}`;
                    dayDiv.appendChild(dayTitle);

                    daySnapshot.forEach((dayDoc) => {
                      const entryDiv = document.createElement('div');
                      entryDiv.classList.add('entry');

                      const entryTitle = document.createElement('h4');
                      entryTitle.textContent = dayDoc.id;
                      entryDiv.appendChild(entryTitle);

                      const entryData = dayDoc.data();
                      const entryList = document.createElement('ul');

                      for (const key in entryData) {
                        const listItem = document.createElement('li');
                        if (typeof entryData[key] === 'object') {
                          listItem.innerHTML = `<strong>${key}:</strong> ${JSON.stringify(entryData[key])}`;
                        } else {
                          listItem.innerHTML = `<strong>${key}:</strong> ${entryData[key]}`;
                        }
                        entryList.appendChild(listItem);
                      }

                      entryDiv.appendChild(entryList);
                      dayDiv.appendChild(entryDiv);
                    });

                    tripDiv.appendChild(dayDiv);
                  });
              }
            } else {
              const noDays = document.createElement('p');
              noDays.textContent = 'No total_days field available.';
              tripDiv.appendChild(noDays);
            }

            tripsContainer.appendChild(tripDiv);
          });
        })
        .catch((error) => {
          console.error("Error fetching user's trips: ", error);
          tripsContainer.innerHTML = `<p>Error fetching trips: ${error.message}</p>`;
        });
    }
  </script>

</body>

</html>
